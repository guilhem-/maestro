; PlatformIO project configuration for Maestro C3
; Single-device ESP32-C3 wireless orchestra conductor.

[env:esp32-c3-devkitm-1]
platform = espressif32@^6.9.0
board = esp32-c3-devkitm-1
framework = arduino

board_build.filesystem = littlefs
board_build.partitions = partitions.csv
board_build.flash_mode = dio

upload_speed = 460800
; ESP32-C3 native USB-Serial/JTAG: the download stub crashes at the first
; flash command on this link, so flash via the ROM loader instead.
upload_flags = --no-stub

monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; CORE_DEBUG_LEVEL=3 -> INFO; pin AsyncTCP to core 0 (the only core on C3).
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DCONFIG_ASYNC_TCP_RUNNING_CORE=0
    ; Route Serial to the native USB-Serial/JTAG port so `pio device monitor` works.
    ; On the C3 both flags are required: USB_MODE=1 selects the hardware CDC/JTAG
    ; (the C3 has no TinyUSB OTG), CDC_ON_BOOT=1 binds Serial to it.
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

lib_deps =
    esp32async/ESPAsyncWebServer @ ^3.6.0
    esp32async/AsyncTCP @ ^3.3.0
    bblanchon/ArduinoJson @ ^7.2.0
